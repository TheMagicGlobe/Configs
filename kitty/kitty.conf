## ==========================================
# 1. FONTS (Crisp & Technical)
# ==========================================
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ==========================================
# 2. WINDOW AESTHETICS (Padding & Layout)
# ==========================================
# Adds an inner cushion so text doesn't touch the borders
window_padding_width 10

# Disables default titlebars (Sway already handles your borders)
hide_window_decorations yes

# Optional: Uncomment the line below if you want slight transparency
# background_opacity 0.95

# ==========================================
# 3. TAB BAR (Slick Slanted Look)
# ==========================================
tab_bar_min_tabs            1
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# ==========================================
# 4. THEME INJECTION
# ==========================================
# This imports the Mocha colors applied by the kitten in Step 1
include current-theme.conf

