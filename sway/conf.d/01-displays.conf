# Output Configuration
# TIP: Run `swaymsg -t get_outputs` to find your display names (e.g., DP-1, eDP-1, HDMI-A-1)
# Adjust the names, resolutions, and positions below to match your setup!
output DP-2 resolution 1920x1080@144Hz position 0,0 
output DP-1 resolution 2560x1440@144Hz position 1920,0

# Tearing Allowances (Sway 1.8+)
output * render_bit_depth 10 allow_tearing yes

# Input Configuration: Apply flat acceleration to ALL connected mice
input type:pointer {
    accel_profile flat
    natural_scroll disabled
}
