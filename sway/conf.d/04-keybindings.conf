# Core System Controls
bindsym $mod+Return exec $terminal
bindsym $mod+Shift+q kill
bindsym $mod+d exec $menu
bindsym $mod+Shift+c reload
bindsym $mod+Shift+e exec wlogout
floating_modifier $mod normal
bindsym $mod+ctrl+l exec swaylock

# Window Focus Navigation
bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right

# Window Position Management
bindsym $mod+Shift+$left move left
bindsym $mod+Shift+$down move down
bindsym $mod+Shift+$up move up
bindsym $mod+Shift+$right move right

# Workspace Navigation
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9
bindsym $mod+0 workspace number 10

# Container to Workspace Routing
bindsym $mod+Shift+1 move container to workspace number 1
bindsym $mod+Shift+2 move container to workspace number 2
bindsym $mod+Shift+3 move container to workspace number 3
bindsym $mod+Shift+4 move container to workspace number 4
bindsym $mod+Shift+5 move container to workspace number 5
bindsym $mod+Shift+6 move container to workspace number 6
bindsym $mod+Shift+7 move container to workspace number 7
bindsym $mod+Shift+8 move container to workspace number 8
bindsym $mod+Shift+9 move container to workspace number 9
bindsym $mod+Shift+0 move container to workspace number 10

# Workspace Output Assignments
# TIP: Change DP-1 and DP-2 below to match your actual monitor outputs
workspace 1 output DP-1
workspace 3 output DP-1
workspace 5 output DP-1
workspace 7 output DP-1
workspace 9 output DP-1

workspace 2 output DP-2
workspace 4 output DP-2
workspace 6 output DP-2
workspace 8 output DP-2
workspace 10 output DP-2

# Layout Toggles
bindsym $mod+b splith
bindsym $mod+v splitv
bindsym $mod+s layout stacking
bindsym $mod+w layout tabbed
bindsym $mod+e layout toggle split
bindsym $mod+f fullscreen toggle
bindsym $mod+Shift+space floating toggle
bindsym $mod+space focus mode_toggle

# Hardware Media Controls: Volume
bindsym XF86AudioRaiseVolume exec swayosd-client --output-volume raise
bindsym XF86AudioLowerVolume exec swayosd-client --output-volume lower
bindsym XF86AudioMute exec swayosd-client --output-volume mute-toggle
bindsym $mod+minus exec swayosd-client --output-volume lower
bindsym $mod+equal exec swayosd-client --output-volume raise
bindsym $mod+m exec swayosd-client --output-volume mute-toggle
# Hardware Media Controls: Brightness
bindsym XF86MonBrightnessUp exec swayosd-client --brightness raise
bindsym XF86MonBrightnessDown exec swayosd-client --brightness lower
# Custom Brightness Controls (Dual Monitor)
bindsym $mod+KP_Add exec sh -c 'ddcutil --noverify -d 1 setvcp 10 + 10 & ddcutil --noverify -d 2 setvcp 10 + 10 & swayosd-client --brightness raise'
bindsym $mod+KP_Subtract exec sh -c 'ddcutil --noverify -d 1 setvcp 10 - 10 & ddcutil --noverify -d 2 setvcp 10 - 10 & swayosd-client --brightness lower'
#Launch Steam Big Picture Mode for Gaming
bindsym $mod+Shift+g exec sh -c 'killall -9 steam || true; sleep 2; gamescope -W 2560 -H 1440 -r 144 -e -f --immediate-flips --adaptive-sync -- steam -gamepadui '
# Clipboard History Menu
bindsym $mod+c exec cliphist list | wofi --dmenu | cliphist decode | wl-copy
# Clear Clipboard History
bindsym $mod+ctrl+c exec cliphist wipe && notify-send "Clipboard" "History Cleared"
# Screenshot Capture Keybinds
bindsym Print exec sh -c 'grim - | wl-copy && notify-send "Screenshot" "Copied full screen to clipboard"'
bindsym $mod+Shift+s exec sh -c 'grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Copied region to clipboard"'
